name: CI
on:
  push:
  pull_request:
jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ hashFiles('**/*.gradle.kts') }}
      - name: Unit Tests
        run: ./gradlew testMockDebugUnitTest
      - name: Build Mock Debug APK
        run: ./gradlew assembleMockDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cutmize-mock-debug
          path: app/build/outputs/apk/mock/debug/*.apk
