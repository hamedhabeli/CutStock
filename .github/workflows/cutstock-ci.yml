name: cutstock-ci

on:
  workflow_dispatch:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  build-test-release:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
      ANDROID_HOME: ${{ github.workspace }}/android-sdk
      JAVA_TOOL_OPTIONS: -Dfile.encoding=UTF-8
      CUTSTOCK_KEY_ALIAS: ${{ secrets.CUTSTOCK_KEY_ALIAS }}
      CUTSTOCK_KEYSTORE_PASSWORD: ${{ secrets.CUTSTOCK_KEYSTORE_PASSWORD }}
      CUTSTOCK_KEY_PASSWORD: ${{ secrets.CUTSTOCK_KEY_PASSWORD }}
      CUTSTOCK_KEYSTORE_BASE64: ${{ secrets.CUTSTOCK_KEYSTORE_BASE64 }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'settings.gradle.kts', 'build.gradle.kts') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Bootstrap SDK and project
        run: bash scripts/bootstrap.sh

      - name: Run JVM smoke tests
        run: bash scripts/run_smoke_tests.sh

      - name: Run instrumentation smoke tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: bash scripts/run_smoke_tests.sh

      - name: Build signed release APK
        run: bash scripts/build_release.sh

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: cutstock-release
          path: |
            app/build/outputs/apk/release/app-release-signed.apk
            app/build/outputs/mapping/release/mapping.txt
            app/build/outputs/native-debug-symbols/release/native-debug-symbols.zip
            app/keystore-info.txt
          if-no-files-found: warn
